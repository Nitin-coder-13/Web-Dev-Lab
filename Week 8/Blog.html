<!DOCTYPE html>
<html>
<head>
<title>My Blog</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
 margin: 0;
 font-family: 'Segoe UI';
 background: linear-gradient(135deg, #667eea, #764ba2);
}
.navbar {
 background: rgba(0,0,0,0.3);
 backdrop-filter: blur(10px);
}
.hero {
 text-align: center;
 color: white;
 padding: 40px 20px;
}
.card {
 border: none;
 border-radius: 20px;
 padding: 20px;
 background: rgba(255,255,255,0.15);
 backdrop-filter: blur(10px);
 color: white;
 box-shadow: 0 10px 25px rgba(0,0,0,0.3);
 transition: 0.3s;
}
.card:hover {
 transform: translateY(-8px) scale(1.02);
}
.btn-custom {
 background: white;
 color: #764ba2;
 border-radius: 10px;
 font-weight: bold;
}
.btn-custom:hover {
 background: #ffcc00;
}
footer {
 text-align: center;
 padding: 15px;
 color: white;
}
</style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-dark">
<div class="container">
<a class="navbar-brand" href="#">My Blog ✨</a>
</div>
</nav>
<!-- Hero -->
<div class="hero">
<h1>Welcome to My Blog</h1>
<p>Sharing my journey in web development 🚀</p>
</div>
<!-- Cards -->
<div class="container">
<div class="row g-4">
<div class="col-md-4">
<div class="card">
<h5>Web Development</h5>
<p>Learning HTML, CSS, and JavaScript step by step.</p>
<button class="btn btn-custom">Read More</button>
</div>
</div>
<div class="col-md-4">
<div class="card">
<h5>My Projects</h5>
<p>Portfolio and To-Do App built using modern UI design.</p>
<button class="btn btn-custom">Read More</button>
</div>
</div>
<div class="col-md-4">
<div class="card">
<h5>Future Goals</h5>
<p>Aiming to become a skilled full-stack developer.</p>
<button class="btn btn-custom">Read More</button>
</div>
</div>
</div>
</div>
<!-- Footer -->
<footer>
<p>© 2026 Nitin</p>
</footer>
</body>
</html>
